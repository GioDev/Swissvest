    // --- HISTORICAL FIDELITY ENGINE SEEDING ---
    function createSeededRandom(seed) {
      let h = seed ^ 0xDEADBEEF;
      return function() {
        h = Math.imul(h ^ (h >>> 16), 2246822507);
        h = Math.imul(h ^ (h >>> 13), 3266489909);
        return ((h ^= h >>> 15) >>> 0) / 4294967296;
      };
    }

    const generateHistoricalReturns = () => {
      const years = [2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025, 2026];
      const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      
      const returnsTable = [];
      let seed = 42;
      const rand = createSeededRandom(seed);
      
      for (const year of years) {
        for (let mIdx = 0; mIdx < 12; mIdx++) {
          if (year === 2026 && mIdx > 4) break; // End simulation at May 2026
          
          const monthLabel = `${months[mIdx]} ${year}`;
          let equityMod = 0;
          let globalEquityMod = 0;
          let bondMod = 0;
          let goldMod = 0;

          if (year === 2018) {
            equityMod = -0.008; globalEquityMod = -0.010; bondMod = 0.001; goldMod = 0.003;
          } else if (year === 2019) {
            equityMod = 0.018; globalEquityMod = 0.021; bondMod = 0.002; goldMod = 0.012;
          } else if (year === 2020) {
            if (mIdx === 1 || mIdx === 2) {
              equityMod = -0.085; globalEquityMod = -0.115; bondMod = -0.005; goldMod = 0.035;
            } else {
              equityMod = 0.024; globalEquityMod = 0.032; bondMod = 0.003; goldMod = 0.008;
            }
          } else if (year === 2021) {
            equityMod = 0.016; globalEquityMod = 0.019; bondMod = -0.002; goldMod = -0.005;
          } else if (year === 2022) {
            equityMod = -0.015; globalEquityMod = -0.017; bondMod = -0.011; goldMod = 0.002;
          } else if (year === 2023) {
            equityMod = 0.006; globalEquityMod = 0.014; bondMod = 0.004; goldMod = 0.011;
          } else if (year === 2024) {
            equityMod = 0.011; globalEquityMod = 0.018; bondMod = 0.003; goldMod = 0.022;
          } else if (year === 2025) {
            equityMod = 0.009; globalEquityMod = 0.013; bondMod = 0.005; goldMod = 0.014;
          } else if (year === 2026) {
            equityMod = 0.005; globalEquityMod = 0.008; bondMod = 0.002; goldMod = 0.015;
          }

          returnsTable.push({
            date: monthLabel,
            CHSPI: equityMod + (rand() * 0.03 - 0.015),
            CSSMI: (equityMod * 0.95) + (rand() * 0.028 - 0.014),
            IWDC: globalEquityMod + (rand() * 0.035 - 0.0175),
            CSBGC3: bondMod + (rand() * 0.008 - 0.004),
            CSGOLD: goldMod + (rand() * 0.04 - 0.018)
          });
        }
      }
      return returnsTable;
    };

    const MONTHLY_RETURNS_DB = generateHistoricalReturns();

    // --- REUSABLE GEMINI API HELPER WITH EXPONENTIAL BACKOFF (STRICT SPEC COMPLIANT) ---
    const callGemini = async (prompt, systemInstruction = null, responseSchema = null) => {
      const apiKey = ""; // Runtime automatically injects this
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
      
      const payload = {
        contents: [{ parts: [{ text: prompt }] }]
      };
      
      if (systemInstruction) {
        payload.systemInstruction = { parts: [{ text: systemInstruction }] };
      }
      
      if (responseSchema) {
        payload.generationConfig = {
          responseMimeType: "application/json",
          responseSchema: responseSchema
        };
      }

      let attempt = 0;
      const retries = 5;
      
      while (attempt < retries) {
        try {
          const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          
          const data = await response.json();
          const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
          if (text) {
            return text;
          }
          throw new Error("Empty text returned in candidate content.");
        } catch (error) {
          attempt++;
          if (attempt >= retries) {
            throw error;
          }
          const backoffDelay = Math.pow(2, attempt) * 1000; // 2s, 4s, 8s, 16s...
          await new Promise(resolve => setTimeout(resolve, backoffDelay));
        }
      }
    };

    // --- MAIN REACT APPLICATION COMPONENT ---
    function App() {
      const [initialCapital, setInitialCapital] = useState(50000);
      const [monthlyAddition, setMonthlyAddition] = useState(500);
      const [stampDutyExempt, setStampDutyExempt] = useState(false);
      const [brokerFeePercent, setBrokerFeePercent] = useState(0.09);
      const [rebalanceFrequency, setRebalanceFrequency] = useState('annual');
      const [weights, setWeights] = useState({ CHSPI: 40, CSSMI: 10, IWDC: 30, CSBGC3: 15, CSGOLD: 5 });
      const [activeTab, setActiveTab] = useState('backtest');
      const [selectedEtfInfo, setSelectedEtfInfo] = useState('CHSPI');
      const [hoverIndex, setHoverIndex] = useState(null);

      // LLM UI States
      const [aiAnalysis, setAiAnalysis] = useState('');
      const [isLoadingAi, setIsLoadingAi] = useState(false);
      const [aiError, setAiError] = useState('');
      const [customUserQuestion, setCustomUserQuestion] = useState('');

      // AI Strategy Generator states
      const [aiStrategyInput, setAiStrategyInput] = useState('');
      const [aiStrategyExplanation, setAiStrategyExplanation] = useState('');
      const [isLoadingStrategyGen, setIsLoadingStrategyGen] = useState(false);
      const [strategyGenError, setStrategyGenError] = useState('');

      const handleWeightChange = (id, value) => {
        const cleanVal = Math.max(0, Math.min(100, parseInt(value) || 0));
        setWeights(prev => ({ ...prev, [id]: cleanVal }));
      };

      const normalizeWeights = () => {
        const total = Object.values(weights).reduce((a, b) => a + b, 0);
        if (total === 0) {
          const count = SWISS_ETFS.length;
          const share = Math.floor(100 / count);
          const remainder = 100 % count;
          const newWeights = {};
          SWISS_ETFS.forEach((etf, i) => {
            newWeights[etf.id] = share + (i < remainder ? 1 : 0);
          });
          setWeights(newWeights);
          return;
        }
        const newWeights = {};
        let tempSum = 0;
        const entries = Object.entries(weights);
        entries.forEach(([key, val], idx) => {
          if (idx === entries.length - 1) {
            newWeights[key] = 100 - tempSum;
          } else {
            const calculated = Math.round((val / total) * 100);
            newWeights[key] = calculated;
            tempSum += calculated;
          }
        });
        setWeights(newWeights);
      };

      const totalAllocatedWeight = useMemo(() => {
        return Object.values(weights).reduce((a, b) => a + b, 0);
      }, [weights]);

      const applyPreset = (preset) => {
        setWeights({ ...preset.allocations });
      };

      const backtestResults = useMemo(() => {
        if (totalAllocatedWeight !== 100) return null;

        let currentPortfolioValue = initialCapital;
        let totalSavingsDeposited = initialCapital;
        let totalBrokerFeesPaid = 0;
        let totalStampDutiesPaid = 0;
        let totalExpenseRatiosPaid = 0;

        let etfHoldings = {};
        SWISS_ETFS.forEach(etf => {
          const etfWeight = weights[etf.id] / 100;
          const amountToInvest = initialCapital * etfWeight;
          const buyStampDuty = stampDutyExempt ? 0 : amountToInvest * (etf.stampDutyRate / 100);
          const buyBrokerFee = amountToInvest * (brokerFeePercent / 100);
          
          totalStampDutiesPaid += buyStampDuty;
          totalBrokerFeesPaid += buyBrokerFee;
          etfHoldings[etf.id] = amountToInvest - (buyStampDuty + buyBrokerFee);
        });

        const historicalTimeline = [];
        let peakValue = currentPortfolioValue;
        let maxDrawdown = 0;

        MONTHLY_RETURNS_DB.forEach((monthlyData, index) => {
          let sumValueBeforeInvestments = 0;
          
          SWISS_ETFS.forEach(etf => {
            const growthRate = monthlyData[etf.id] || 0;
            etfHoldings[etf.id] = etfHoldings[etf.id] * (1 + growthRate);
            const monthlyTerRate = (etf.ter / 100) / 12;
            const terCharge = etfHoldings[etf.id] * monthlyTerRate;
            etfHoldings[etf.id] -= terCharge;
            totalExpenseRatiosPaid += terCharge;
            sumValueBeforeInvestments += etfHoldings[etf.id];
          });

          const freshCapital = monthlyAddition;
          totalSavingsDeposited += freshCapital;

          SWISS_ETFS.forEach(etf => {
            const weightShare = weights[etf.id] / 100;
            const addAmount = freshCapital * weightShare;
            if (addAmount > 0) {
              const buyStampDuty = stampDutyExempt ? 0 : addAmount * (etf.stampDutyRate / 100);
              const buyBrokerFee = addAmount * (brokerFeePercent / 100);
              totalStampDutiesPaid += buyStampDuty;
              totalBrokerFeesPaid += buyBrokerFee;
              etfHoldings[etf.id] += addAmount - (buyStampDuty + buyBrokerFee);
            }
          });

          let monthlyTotalValue = 0;
          SWISS_ETFS.forEach(etf => {
            monthlyTotalValue += etfHoldings[etf.id];
          });

          const shouldRebalance = 
            (rebalanceFrequency === 'semi-annual' && (index + 1) % 6 === 0) ||
            (rebalanceFrequency === 'annual' && (index + 1) % 12 === 0);

          if (shouldRebalance) {
            SWISS_ETFS.forEach(etf => {
              const targetedValue = monthlyTotalValue * (weights[etf.id] / 100);
              const variance = targetedValue - etfHoldings[etf.id];
              if (Math.abs(variance) > 50) {
                const feePenaltyRate = (brokerFeePercent / 100) + (stampDutyExempt ? 0 : (etf.stampDutyRate / 100));
                const rebalanceCost = Math.abs(variance) * feePenaltyRate;
                totalBrokerFeesPaid += Math.abs(variance) * (brokerFeePercent / 100);
                if (!stampDutyExempt) {
                  totalStampDutiesPaid += Math.abs(variance) * (etf.stampDutyRate / 100);
                }
                etfHoldings[etf.id] = targetedValue - rebalanceCost;
              } else {
                etfHoldings[etf.id] = targetedValue;
              }
            });

            monthlyTotalValue = 0;
            SWISS_ETFS.forEach(etf => {
              monthlyTotalValue += etfHoldings[etf.id];
            });
          }

          if (monthlyTotalValue > peakValue) peakValue = monthlyTotalValue;
          const currentDrawdown = peakValue > 0 ? (peakValue - monthlyTotalValue) / peakValue : 0;
          if (currentDrawdown > maxDrawdown) maxDrawdown = currentDrawdown;

          historicalTimeline.push({
            date: monthlyData.date,
            portfolioValue: Math.round(monthlyTotalValue),
            savingsDeposited: Math.round(totalSavingsDeposited),
            netGain: Math.round(monthlyTotalValue - totalSavingsDeposited),
            holdingsSnapshot: { ...etfHoldings }
          });
        });

        const finalValue = historicalTimeline[historicalTimeline.length - 1].portfolioValue;
        const durationInYears = MONTHLY_RETURNS_DB.length / 12;
        const simpleCagr = (Math.pow(finalValue / totalSavingsDeposited, 1 / durationInYears) - 1) * 100;

        let cashAltVal = initialCapital;
        for (let i = 0; i < MONTHLY_RETURNS_DB.length; i++) {
          cashAltVal = cashAltVal * (1 + 0.005 / 12) + monthlyAddition;
        }

        return {
          timeline: historicalTimeline,
          finalValue,
          totalDeposited: totalSavingsDeposited,
          netGain: finalValue - totalSavingsDeposited,
          simpleCagr: simpleCagr.toFixed(2),
          maxDrawdown: (maxDrawdown * 100).toFixed(2),
          totalBrokerFeesPaid: Math.round(totalBrokerFeesPaid),
          totalStampDutiesPaid: Math.round(totalStampDutiesPaid),
          totalExpenseRatiosPaid: Math.round(totalExpenseRatiosPaid),
          frictionTotal: Math.round(totalBrokerFeesPaid + totalStampDutiesPaid + totalExpenseRatiosPaid),
          cashAlternativeValue: Math.round(cashAltVal),
          outperformanceVsCash: Math.round(finalValue - cashAltVal)
        };
      }, [initialCapital, monthlyAddition, weights, stampDutyExempt, brokerFeePercent, rebalanceFrequency, totalAllocatedWeight]);

      const calculatedPortfolioTer = useMemo(() => {
        let weightedTer = 0;
        SWISS_ETFS.forEach(etf => {
          weightedTer += (weights[etf.id] / 100) * etf.ter;
        });
        return weightedTer.toFixed(3);
      }, [weights]);

      const chartData = useMemo(() => {
        if (!backtestResults) return { points: [], maxVal: 0 };
        const timeline = backtestResults.timeline;
        const maxVal = Math.max(...timeline.map(d => Math.max(d.portfolioValue, d.savingsDeposited))) * 1.05;
        const minVal = 0;
        const width = 800;
        const height = 300;
        const padding = 40;

        const points = timeline.map((d, index) => {
          const x = padding + (index / (timeline.length - 1)) * (width - padding * 2);
          const yPortfolio = height - padding - ((d.portfolioValue - minVal) / (maxVal - minVal)) * (height - padding * 2);
          const ySavings = height - padding - ((d.savingsDeposited - minVal) / (maxVal - minVal)) * (height - padding * 2);
          return { x, yPortfolio, ySavings, data: d };
        });

        return { points, maxVal, width, height, padding };
      }, [backtestResults]);

      // --- GEMINI: INTERACTIVE MULTI-USE WEALTH ADVISORY CALL ---
      const fetchAiAnalysis = async (userQuestion = "") => {
        setIsLoadingAi(true);
        setAiError('');
        setAiAnalysis('');

        const contextQuery = `
          Analyze this ETF investment strategy with standard reference points.
          Initial Capital: CHF ${initialCapital}
          Monthly Contributions: CHF ${monthlyAddition}
          Rebalancing Frequency: ${rebalanceFrequency}
          Portfolio TER: ${calculatedPortfolioTer}%
          Friction Paid: CHF ${backtestResults?.frictionTotal || 0}
          Allocations: CHSPI (Broad SPI): ${weights.CHSPI}%, CSSMI (SMI Blue Chips): ${weights.CSSMI}%, IWDC (World CHF Hedged): ${weights.IWDC}%, CSBGC3 (CHF Corporate Bonds): ${weights.CSBGC3}%, CSGOLD (Gold): ${weights.CSGOLD}%
          Simulation Backtest (Jan 2018 - May 2026):
          - Final Value: CHF ${backtestResults?.finalValue?.toLocaleString() || 'N/A'}
          - Net Gains: CHF ${backtestResults?.netGain?.toLocaleString() || 'N/A'}

                              d={chartData.points.map(p => `${p.x},${p.yPortfolio}`).reduce((acc, current, i) => i === 0 ? `M ${current}` : `${acc} L ${current}`, '')}
                              fill="none"
                              stroke="#E31B23"
                              strokeWidth="3.5"
                            />

                            {hoverIndex !== null && chartData.points[hoverIndex] && (
                              <g>
                                <line x1={chartData.points[hoverIndex].x} y1={chartData.padding} x2={chartData.points[hoverIndex].x} y2={chartData.height - chartData.padding} stroke="#64748b" strokeDasharray="2,2" />
                                <circle cx={chartData.points[hoverIndex].x} cy={chartData.points[hoverIndex].yPortfolio} r="6" fill="#E31B23" stroke="#fff" strokeWidth="2" />
                                <circle cx={chartData.points[hoverIndex].x} cy={chartData.points[hoverIndex].ySavings} r="5" fill="#475569" stroke="#fff" strokeWidth="1.5" />
                              </g>
                            )}
                          </svg>

                          {hoverIndex !== null && chartData.points[hoverIndex] && (
                            <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-slate-900/95 border border-slate-700 p-3.5 rounded-xl shadow-2xl flex flex-col space-y-1 w-60 z-20 pointer-events-none">
                              <div className="text-xs font-black text-slate-300 border-b border-slate-800 pb-1 mb-1">{chartData.points[hoverIndex].data.date}</div>
                              <div className="flex justify-between text-xs text-slate-400"><span>Portfolio Value:</span><span className="font-extrabold text-white">CHF {chartData.points[hoverIndex].data.portfolioValue.toLocaleString()}</span></div>
                              <div className="flex justify-between text-xs text-slate-400"><span>Deposited:</span><span className="font-bold text-slate-300">CHF {chartData.points[hoverIndex].data.savingsDeposited.toLocaleString()}</span></div>
                            </div>
                          )}
                        </div>
                      </div>
                    </>
                  )}
                </>
              )}

              {activeTab === 'tax-insights' && (
                <div className="bg-slate-900 border border-slate-800 rounded-2xl p-5 shadow-xl space-y-6">
                  <div className="flex items-center space-x-2.5 pb-3 border-b border-slate-800">
                    <Icon name="Coins" className="w-5 h-5 text-red-500" />
                    <h3 className="font-bold text-slate-100 text-lg">Swiss Investment Friction Modeler</h3>
                  </div>

                  <div className="grid grid-cols-3 gap-4">
                    <div className="bg-slate-950 p-4 rounded-xl border border-slate-800 text-center">
                      <span className="text-[10px] font-bold text-slate-500 uppercase block mb-1">Total Broker Commission</span>
                      <span className="text-lg font-extrabold text-white">CHF {backtestResults?.totalBrokerFeesPaid}</span>
                    </div>
                    <div className="bg-slate-950 p-4 rounded-xl border border-slate-800 text-center">
                      <span className="text-[10px] font-bold text-slate-500 uppercase block mb-1">Swiss Federal Stamp Duty</span>
                      <span className="text-lg font-extrabold text-white">CHF {backtestResults?.totalStampDutiesPaid}</span>
                    </div>
                    <div className="bg-slate-950 p-4 rounded-xl border border-slate-800 text-center">
                      <span className="text-[10px] font-bold text-slate-500 uppercase block mb-1">Accumulated Fund TER</span>
                      <span className="text-lg font-extrabold text-white">CHF {backtestResults?.totalExpenseRatiosPaid}</span>
                    </div>
                  </div>

                  <div className="space-y-4 text-xs text-slate-400 leading-relaxed">
                    <div className="p-3 bg-slate-950/60 rounded-xl border border-slate-800">
                      <h4 className="font-extrabold text-slate-200 mb-1">The Swiss Stamp Duty (Umsatzabgabe)</h4>
                      <p>Swiss-domiciled ETFs (like CHSPI, CSSMI) carry a duty rate of 0.075%, whereas foreign assets (like Ireland-domiciled IWDC) have a rate of 0.150%.</p>
                    </div>
                    <div className="p-3 bg-slate-950/60 rounded-xl border border-slate-800">
                      <h4 className="font-extrabold text-slate-200 mb-1">Withholding Tax (Verrechnungssteuer)</h4>
                      <p>Switzerland holds a 35% withholding tax on domestic corporate yields, fully claimable back via standard local tax declaration documents.</p>
                    </div>
                  </div>
                </div>
              )}

              {/* LIVE AI ADVISOR DESK TAB WITH CUSTOM INTERACTION ✨ */}
              {activeTab === 'advisor' && (
                <div className="bg-slate-900 border border-slate-800 rounded-2xl p-5 shadow-xl space-y-4">
                  <div className="flex items-center justify-between pb-3 border-b border-slate-800">
                    <div className="flex items-center space-x-2">
                      <Icon name="Sparkles" className="w-5 h-5 text-amber-300 animate-pulse" />
                      <h3 className="font-bold text-slate-100 text-lg">Interactive Swiss Wealth Desk</h3>
                    </div>
                    <span className="text-[10px] bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-2.5 py-0.5 rounded-full font-bold">
                      Connected
                    </span>
                  </div>

                  <p className="text-xs text-slate-400 leading-relaxed">
                    Consult your digital Swiss private banking specialist. Input custom questions regarding tax reclamation, stamp duties, or Pillar 3a replacement offsets based on your current live portfolio configuration.
                  </p>

                  {/* Ask custom prompt input area */}
                  <div className="space-y-2 bg-slate-950 p-3 rounded-xl border border-slate-800">
                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-wide block">
                      Custom Consulting Request
                    </label>
                    <div className="flex space-x-2">
                      <input
                        type="text"
                        value={customUserQuestion}
                        onChange={(e) => setCustomUserQuestion(e.target.value)}
                        placeholder="e.g., How does this index allocation compare to a pure 3a insurance strategy?"
                        className="flex-1 bg-slate-900 border border-slate-800 text-xs text-slate-200 rounded-lg py-2 px-3 focus:outline-none focus:border-red-500"
                      />
                      <button
                        onClick={() => fetchAiAnalysis(customUserQuestion)}
                        disabled={isLoadingAi}
                        className="px-4 py-2 bg-red-600 hover:bg-red-700 disabled:bg-slate-800 text-white text-xs font-bold rounded-lg transition-colors flex items-center space-x-1"
                      >
                        <span>Ask ✨</span>
                      </button>
                    </div>

                    {/* Pre-suggested quick topic pill buttons */}
                    <div className="flex flex-wrap gap-1.5 pt-1">
                      {[
                        "Explain Verrechnungssteuer refund checks.",
                        "Is my SPI home-bias too aggressive?",
                        "How can I minimize Stamp Duty rebalances?"
                      ].map((hint, idx) => (
                        <button
                          key={idx}
                          onClick={() => {
                            setCustomUserQuestion(hint);
                            fetchAiAnalysis(hint);
                          }}
                          className="text-[9px] bg-slate-900 hover:bg-slate-800 text-slate-400 hover:text-slate-200 px-2 py-1 rounded-md border border-slate-800/80 transition"
                        >
                          {hint}
                        </button>
                      ))}
                    </div>
                  </div>

                  {aiError && (
                    <div className="p-3 bg-red-950/30 border border-red-900/40 rounded-xl text-xs text-red-300 flex items-center space-x-2">
                      <Icon name="ShieldAlert" className="w-4 h-4 text-red-400 flex-shrink-0" />
                      <span>{aiError}</span>
                    </div>
                  )}

                  {/* Advisory output sheet container */}
                  <div className="bg-slate-950 p-4 rounded-xl border border-slate-800 min-h-[200px] max-h-[400px] overflow-y-auto whitespace-pre-line text-xs text-slate-300 leading-relaxed relative">
                    {isLoadingAi ? (
                      <div className="absolute inset-0 flex flex-col items-center justify-center space-y-2 bg-slate-950/90">
                        <div className="w-6 h-6 border-2 border-red-500 border-t-transparent rounded-full animate-spin"></div>
                        <span className="text-[10px] text-slate-400 font-bold tracking-wide animate-pulse">Drafting Professional Swiss Memo...</span>
                      </div>
                    ) : (
                      aiAnalysis
                    )}
                  </div>
                </div>
              )}
            </section>
          </main>

          <footer className="mt-auto border-t border-slate-800 bg-slate-900/50 py-4 px-6 text-center text-xs text-slate-500 flex justify-between">
            <span>© 2026 Swissvest ETF Strategies AG.</span>
            <span className="text-[10px] uppercase font-bold text-slate-400">Swiss Integrity Standard</span>
          </footer>
        </div>
      );
    }

    // 5. Render App safely to target root node
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
